<html>
<head><meta charset="UTF-8"><title>Profit Calculator</title></head>
<body style="font-family:sans-serif;background:#00a8e8;padding:50px;text-align:center">
<div style="background:white;padding:30px;border-radius:20px;max-width:400px;margin:0 auto">
<h2>Profit Calculator</h2>
<input id="cost" placeholder="Cost 成本" style="width:100%;padding:10px;margin:5px 0">
<input id="price" placeholder="Price 售价" style="width:100%;padding:10px;margin:5px 0">
<button onclick="calc()" style="width:100%;padding:15px;background:#00a8e8;color:white;border:none;border-radius:10px;cursor:pointer;margin-top:10px">Calculate</button>
<div style="margin-top:20px;padding:20px;background:#e8f5e9;border-radius:10px">
Profit: $<span id="p">0</span>
</div>
</div>
<script>
function calc(){
var c=parseFloat(document.getElementById('cost').value)||0;
var s=parseFloat(document.getElementById('price').value)||0;
var profit=s-c;
document.getElementById('p').innerText=profit.toFixed(2);
}
</script>
</body>
</html>
